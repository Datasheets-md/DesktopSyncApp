name: Build binaries

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read version
        id: version
        shell: bash
        run: echo "value=$(python -c 'from version import __version__; print(__version__)')" >> "$GITHUB_OUTPUT"

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m PyInstaller --onefile --windowed --name dBsync \
            --add-data "dbsync.json:." \
            --add-data "icon.png:." \
            --icon icon.png \
            --clean dbsync.py
          chmod +x dist/dBsync
          mv dist/dBsync "dist/dBsync-${{ steps.version.outputs.value }}"

          # Package as AppImage (recognizable, double-clickable Linux format)
          VERSION="${{ steps.version.outputs.value }}"
          curl -sL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          APPDIR=dist/dBsync.AppDir
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/applications" "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp "dist/dBsync-${VERSION}" "$APPDIR/usr/bin/dBsync"
          chmod +x "$APPDIR/usr/bin/dBsync"
          cat > "$APPDIR/dBsync.desktop" <<EOF
          [Desktop Entry]
          Name=dBsync
          Exec=dBsync
          Icon=dbsync
          Type=Application
          Categories=Development;Engineering;
          Comment=Sync components from Datasheets.md to KiCad
          EOF
          cp "$APPDIR/dBsync.desktop" "$APPDIR/usr/share/applications/"
          cp icon.png "$APPDIR/dbsync.png"
          cp icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/dbsync.png"
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/dBsync" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$APPDIR" "dist/dBsync-${VERSION}.AppImage"

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          python -m PyInstaller --onedir --windowed --name dBsync \
            --add-data "dbsync.json:." \
            --add-data "icon.png:." \
            --icon icon-windowed.icns \
            --clean dbsync.py
          rm -rf dist/dBsync
          mv dist/dBsync.app "dist/dBsync-${{ steps.version.outputs.value }}.app"
          ( cd dist && zip -ry "dBsync-${{ steps.version.outputs.value }}.zip" "dBsync-${{ steps.version.outputs.value }}.app" )

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          python -m PyInstaller --onefile --windowed --name dBsync \
            --add-data "dbsync.json;." \
            --add-data "icon.png;." \
            --icon icon.ico \
            --clean dbsync.py
          mv dist/dBsync.exe "dist/dBsync-${{ steps.version.outputs.value }}.exe"

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: dBsync-linux
          path: dist/dBsync-${{ steps.version.outputs.value }}.AppImage

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: dBsync-macos
          path: dist/dBsync-${{ steps.version.outputs.value }}.zip

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: dBsync-windows
          path: dist/dBsync-${{ steps.version.outputs.value }}.exe
